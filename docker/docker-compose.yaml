version: '3.8'

networks:
  goodhamburguerapp-network:
    driver: bridge
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuaSenhaForte123!
    volumes:
      - sql_data:/var/opt/mssql


volumes:

  sql_data: